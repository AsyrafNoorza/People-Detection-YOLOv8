# YOLOv8 People Detection Training Configuration

# Model Configuration
model:
  name: "yolov8n"  # Options: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
  pretrained: true
  num_classes: 1
  class_names: ["person"]

# Training Parameters
training:
  epochs: 100
  batch_size: 16
  image_size: 640
  device: "auto"  # auto, cpu, 0, 1, 2, etc.
  
  # Learning Rate
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  
  # Warmup
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  
  # Loss Weights
  box: 7.5
  cls: 0.5
  dfl: 1.5
  
  # Data Augmentation
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0
  auto_augment: "randaugment"
  erasing: 0.4
  crop_fraction: 1.0

# Dataset Configuration
dataset:
  path: "data/processed"
  train: "train/images"
  val: "valid/images"
  test: "test/images"
  
  # Data Processing
  cache: true
  workers: 4
  val: true

# Output Configuration
output:
  project: "runs/detect"
  name: "people_detection"
  save: true
  save_period: 10
  plots: true
  verbose: true

# Evaluation
evaluation:
  conf_threshold: 0.5
  iou_threshold: 0.45
  max_det: 300
  agnostic_nms: false

# Logging
logging:
  level: "INFO"
  save_dir: "logs"
  log_interval: 10

# Reproducibility
seed: 42
deterministic: true
